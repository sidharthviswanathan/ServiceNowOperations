---
- name: ServiceNow Operations with Collection
  hosts: localhost
  gather_facts: false
 
  tasks:
    - name: Create an incident
      servicenow.itsm.incident:
        instance:
          host: "{{ servicenow_instance }}"
          username: "{{ servicenow_username }}"
          password: "{{ servicenow_password }}"
        state: new
        short_description: "Test incident from Ansible Collection"
        urgency: medium
        impact: medium
        caller: "{{ servicenow_username }}"
      register: incident

    - name: Display incident details
      debug:
        var: incident

    - name: Query incidents
      servicenow.itsm.incident_info:
        instance:
          host: "{{ servicenow_instance }}"
          username: "{{ servicenow_username }}"
          password: "{{ servicenow_password }}"
        query:
          - urgency: = high
            state: = new
      register: incidents

    - name: Display queried incidents
      debug:
        var: incidents
